<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <!-- Blade gradients -->
    <linearGradient id="bladeMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="15%" stop-color="#f0f0f0"/>
      <stop offset="35%" stop-color="#d6d6d6"/>
      <stop offset="60%" stop-color="#b8b8b8"/>
      <stop offset="85%" stop-color="#9a9a9a"/>
      <stop offset="100%" stop-color="#7a7a7a"/>
    </linearGradient>
    <linearGradient id="bladeEdge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#bfbfbf" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="fullerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cfcfcf"/>
      <stop offset="50%" stop-color="#9a9a9a"/>
      <stop offset="100%" stop-color="#6a6a6a"/>
    </linearGradient>
    <linearGradient id="guardMetal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a4a4f"/>
      <stop offset="50%" stop-color="#2a2a2d"/>
      <stop offset="100%" stop-color="#1a1a1d"/>
    </linearGradient>
    <linearGradient id="guardHighlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5f5f5" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="gripWrap" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2c2c30"/>
      <stop offset="50%" stop-color="#1f1f23"/>
      <stop offset="100%" stop-color="#141417"/>
    </linearGradient>
    <radialGradient id="pommelOuter" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="40%" stop-color="#c7c7c7"/>
      <stop offset="100%" stop-color="#7a7a7a"/>
    </radialGradient>
    <radialGradient id="pommelInner" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#bfbfbf"/>
    </radialGradient>
  </defs>
  
  <!-- Long blade with taper -->
  <path d="M24 2 L27 32 Q24 34 21 32 Z" fill="url(#bladeMain)"/>
  
  <!-- Blade edge highlight -->
  <path d="M24 3 L26 32 Q24 33 22 32 Z" fill="url(#bladeEdge)" opacity="0.35"/>
  
  <!-- Fuller (deep groove) -->
  <path d="M24 4 L25 30 Q24 31 23 30 Z" fill="url(#fullerGrad)" opacity="0.55"/>
  
  <!-- Decorative etching lines -->
  <line x1="23" y1="8" x2="25" y2="8" stroke="#bfbfbf" stroke-width="0.3" opacity="0.25"/>
  <line x1="23" y1="12" x2="25" y2="12" stroke="#bfbfbf" stroke-width="0.3" opacity="0.25"/>
  <line x1="23" y1="16" x2="25" y2="16" stroke="#bfbfbf" stroke-width="0.3" opacity="0.25"/>
  <line x1="23" y1="20" x2="25" y2="20" stroke="#bfbfbf" stroke-width="0.3" opacity="0.25"/>
  <line x1="23" y1="24" x2="25" y2="24" stroke="#bfbfbf" stroke-width="0.3" opacity="0.25"/>
  
  <!-- Ornate crossguard -->
  <path d="M14 32 Q18 30 22 31 H26 Q30 30 34 32 Q30 34 26 33 H22 Q18 34 14 32 Z" fill="url(#guardMetal)"/>
  <path d="M15 32 Q18 30.5 22 31.2 H26 Q29 30.5 33 32 Q29 33 26 32.5 H22 Q18 33 15 32 Z" fill="url(#guardHighlight)" opacity="0.4"/>
  
  <!-- Grip -->
  <rect x="21" y="33" width="6" height="8" rx="1" fill="url(#gripWrap)"/>
  
  <!-- Grip wrapping -->
  <line x1="21" y1="35" x2="27" y2="35" stroke="#000" stroke-width="0.4" stroke-opacity="0.45"/>
  <line x1="21" y1="37" x2="27" y2="37" stroke="#000" stroke-width="0.4" stroke-opacity="0.45"/>
  <line x1="21" y1="39" x2="27" y2="39" stroke="#000" stroke-width="0.4" stroke-opacity="0.45"/>
  
  <!-- Pommel -->
  <circle cx="24" cy="43" r="3.5" fill="url(#pommelOuter)"/>
  <circle cx="24" cy="43" r="2" fill="url(#pommelInner)"/>
  <ellipse cx="23" cy="42" rx="1.2" ry="0.6" fill="#ffffff" opacity="0.55"/>
</svg>
